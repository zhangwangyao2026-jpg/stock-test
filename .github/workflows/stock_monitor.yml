name: 台股即時監控自動化

on:
  schedule:
    # 這裡使用 Cron 語法，設定每週一至週五早上 01:00 UTC (即台灣時間 09:00) 執行一次
    - cron: '0 1 * * 1-5'
  workflow_dispatch: # 讓您可以隨時在 GitHub 網頁上手動點擊按鈕執行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 檢查程式碼
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安裝必要套件
        run: |
          pip install fugle-marketdata requests

      - name: 執行監控程式
        env:
          # 從 GitHub Secrets 讀取三個關鍵鑰匙
          FUGLE_API_KEY: ${{ secrets.FUGLE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 fugle_test.py