name: 台股即時監控自動化

on:
  schedule:
    - cron: '0 1 * * 1-5'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 檢查程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安裝必要套件
        run: |
          pip install fugle-marketdata requests

      - name: 執行監控程式
        env:
          FUGLE_API_KEY: ${{ secrets.FUGLE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 fugle_test.py