name: 台股即時監控自動化

on:
  schedule:
    # 台灣時間週一至週五 09:00 啟動 (UTC 01:00)
    - cron: '0 1 * * 1-5'
  workflow_dispatch: # 允許手動點擊 Run workflow

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 檢查程式碼
        uses: actions/checkout@v4  # 升級至 v4 消除警告

      - name: 設定 Python 環境
        uses: actions/setup-python@v5 # 升級至 v5 消除警告
        with:
          python-version: '3.10'

      - name: 安裝必要套件
        run: |
          # 這裡新增了 pandas 用於策略計算
          pip install fugle-marketdata requests pandas

      - name: 執行監控程式
        env:
          # 這些是您在 GitHub Settings 裡設定的 Secrets
          FUGLE_API_KEY: ${{ secrets.FUGLE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 fugle_test.py 