name: 台股即時監控自動化

on:
  schedule:
    # 這裡使用 Cron 語法，設定每天週一至週五早上 01:00 UTC (即台灣時間 09:00) 執行
    - cron: '0 1 * * 1-5'
  workflow_dispatch: # 這行讓您可以手動點擊按鈕來執行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 檢查程式碼
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安裝必要套件
        run: |
          pip install fugle-marketdata

      - name: 執行監控程式
        env:
          # 這就是把您剛才在 Settings 設好的 Secret 拿出來用
          FUGLE_API_KEY: ${{ secrets.FUGLE_API_KEY }}
        run: python3 fugle_test.py