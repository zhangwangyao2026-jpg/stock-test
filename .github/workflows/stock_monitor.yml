name: 長線波段監控

on:
  schedule:
    # 台灣時間 08:50 啟動 (UTC 00:50)
    - cron: '50 0 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 300 
    steps:
      - name: 檢查程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          # 已移除 cache: 'pip' 避免報錯

      - name: 安裝必要套件
        run: |
          python -m pip install --upgrade pip
          pip install pandas fugle-marketdata requests

      - name: 執行監控程式
        env:
          FUGLE_API_KEY: ${{ secrets.FUGLE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 -u fugle_test.py
